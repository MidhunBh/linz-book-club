<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main Reading Group</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="app">

  <header class="text-center py-8 border-b border-[#b8c6bb]">
    <h1 class="text-2xl font-semibold">Main Reading Group</h1>
    <p class="text-muted text-sm mt-1">five reads, July through November</p>
  </header>

  <app-nav page="main"></app-nav>

  <main class="max-w-6xl mx-auto p-6">
    <div class="grid md:grid-cols-2 gap-6 items-start">

      <div class="space-y-4">
        <section class="card">
          <img src="ai2.jpg" alt="reading group" class="w-full rounded-md border border-[#b8c6bb]" />
        </section>
        <section class="card">
          <p class="text-sm text-muted leading-relaxed">
            Books are read in the order listed, one per month starting in July.
            Exact meeting dates are announced closer to the time — keep an eye on the home page.
          </p>
        </section>
      </div>

      <section class="space-y-4">
        <p v-if="loading" class="text-muted text-sm">loading books...</p>
        <p v-if="error"   class="text-red-500 text-sm">{{ error }}</p>

        <book-entry
          v-for="book in books"
          :key="book._id"
          :title="book.title"
          :author="book.author"
          :description="book.description"
          :reading-month="book.readingMonth">
        </book-entry>
      </section>

    </div>
  </main>

  <app-footer></app-footer>

</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="components.js"></script>
<script src="app.js"></script>
<script src="api.js"></script>
<script>

  const BookEntry = {
    props: ['title', 'author', 'description', 'readingMonth'],
    computed: {
      descText() { return this.description.split('#')[0].trim(); },
      descTags()  { const i = this.description.indexOf('#'); return i !== -1 ? this.description.slice(i) : ''; }
    },
    template: `
      <div class="card">
        <div class="flex items-center gap-2 mb-2">
          <span style="background:#5f7f6b; color:white; font-size:0.65rem; padding:2px 8px; border-radius:4px; font-weight:600; letter-spacing:0.05em;">
            {{ readingMonth }}
          </span>
        </div>
        <h3 class="card-title" style="margin-bottom:2px;">{{ title }}</h3>
        <p class="text-xs text-muted mb-2">{{ author }}</p>
        <p class="text-sm text-muted leading-relaxed mb-1">{{ descText }}</p>
        <p class="text-xs text-accent tracking-wide">{{ descTags }}</p>
      </div>
    `
  };

  createBookClubApp({
    data() { return { books: [], loading: false, error: null } },
    async mounted() {
      this.loading = true;
      try { this.books = await api.getBooks('Common'); }
      catch (e) { this.error = 'Could not load books. Is the backend running?'; }
      finally { this.loading = false; }
    }
  })
  .component('book-entry', BookEntry)
  .mount('#app');

</script>
</body>
</html>
