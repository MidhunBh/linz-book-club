<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main Reading Group</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="app">

  <header class="text-center py-8 border-b border-[#b8c6bb]">
    <h1 class="text-2xl font-semibold">Main Reading Group</h1>
    <p class="text-muted text-sm mt-1">four monthly reads</p>
  </header>

  <app-nav page="main"></app-nav>

  <main class="max-w-6xl mx-auto p-6">
    <div class="grid md:grid-cols-2 gap-6 items-start">

      <section class="card">
        <img src="ai2.jpg" alt="reading group" class="w-full rounded-md border border-[#b8c6bb]" />
      </section>

      <section class="space-y-4">
        <p v-if="loading" class="text-muted text-sm">loading books...</p>
        <p v-if="error"   class="text-red-500 text-sm">{{ error }}</p>
        <book-entry
          v-for="book in books"
          :key="book._id"
          :title="book.title"
          :description="book.description">
        </book-entry>
      </section>

    </div>
  </main>

  <app-footer></app-footer>

</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="components.js"></script>
<script src="app.js"></script>
<script src="api.js"></script>
<script>

  const BookEntry = {
    props: ['title', 'description'],
    template: `
      <div class="card">
        <h3 class="card-title">{{ title }}</h3>
        <p class="text-sm text-muted leading-relaxed">{{ description }}</p>
      </div>
    `
  };

  createBookClubApp({
    data() {
      return { books: [], loading: false, error: null }
    },
    async mounted() {
      this.loading = true;
      try {
        this.books = await api.getBooks('Common');
      } catch (e) {
        this.error = 'Could not load books. Is the backend running?';
      } finally {
        this.loading = false;
      }
    }
  })
  .component('book-entry', BookEntry)
  .mount('#app');

</script>
</body>
</html>
