<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meetings | Book Club</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="app">

  <header class="text-center py-8 border-b border-[#b8c6bb]">
    <h1 class="text-2xl font-semibold">Upcoming Meetings</h1>
    <p class="text-muted text-sm mt-1">where and when we meet next</p>
    <p class="text-xs mt-1" :class="connected ? 'text-green-600' : 'text-red-400'">
      {{ connected ? '● live' : '○ connecting...' }}
    </p>
  </header>

  <app-nav page="meetings"></app-nav>

  <main class="max-w-4xl mx-auto p-6 space-y-6">

    <!-- ADD MEETING FORM -->
    <section class="card">
      <h2 class="card-title">Schedule a Meeting</h2>
      <form @submit.prevent="addMeeting" class="space-y-4">

        <div>
          <label class="input-label">Title</label>
          <input v-model="newMeeting.title" type="text" class="input-field"
            placeholder="e.g. June Discussion – Midnight's Children">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="input-label">Date</label>
            <input v-model="newMeeting.date" type="date" class="input-field">
          </div>
          <div>
            <label class="input-label">Time</label>
            <input v-model="newMeeting.time" type="time" class="input-field">
          </div>
        </div>

        <div>
          <label class="input-label">Location</label>
          <input v-model="newMeeting.location" type="text" class="input-field">
        </div>

        <div>
          <label class="input-label">Book being discussed</label>
          <input v-model="newMeeting.book" type="text" class="input-field">
        </div>

        <div>
          <label class="input-label">Description</label>
          <textarea v-model="newMeeting.description" rows="2" class="input-field"></textarea>
        </div>

        <button class="btn-primary" :disabled="loading">
          {{ loading ? 'saving...' : 'Add Meeting' }}
        </button>
      </form>
    </section>

    <p v-if="loading && meetings.length === 0" class="text-muted text-sm text-center">loading meetings...</p>
    <p v-if="error" class="text-red-500 text-sm text-center">{{ error }}</p>

    <!-- MEETING CARDS -->
    <section class="space-y-4">
      <meeting-card
        v-for="meeting in meetings"
        :key="meeting._id"
        :meeting="meeting"
        @delete="removeMeeting">
      </meeting-card>
    </section>

  </main>

  <app-footer></app-footer>

</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="components.js"></script>
<script src="app.js"></script>
<script src="api.js"></script>
<script>

  const MeetingCard = {
    props: ['meeting'],
    emits: ['delete'],
    template: `
      <article class="card">
        <div class="flex justify-between items-start">
          <h3 class="card-title">{{ meeting.title }}</h3>
          <button @click="$emit('delete', meeting._id)" class="btn-danger">delete</button>
        </div>
        <p class="text-sm text-muted mt-1">
          📅 {{ meeting.date }} at {{ meeting.time }}
        </p>
        <p class="text-sm text-muted">
          📍 {{ meeting.location }}
        </p>
        <p v-if="meeting.book" class="text-sm text-accent mt-1">
          📖 {{ meeting.book }}
        </p>
        <p v-if="meeting.description" class="text-sm text-muted mt-2 leading-relaxed">
          {{ meeting.description }}
        </p>
      </article>
    `
  };

  createBookClubApp({
    data() {
      return {
        meetings:   [],
        newMeeting: {
          title: '', date: '', time: '',
          location: 'Thalia Linz – Landstraße', book: '', description: ''
        },
        loading:   false,
        error:     null,
        connected: false,
        socket:    null,
      }
    },

    async mounted() {
      this.loading = true;
      try {
        this.meetings = await api.getMeetings();
      } catch (e) {
        this.error = 'Could not load meetings. Is the backend running?';
      } finally {
        this.loading = false;
      }

      this.socket = io(SOCKET_URL);
      this.socket.on('connect',    () => { this.connected = true;  });
      this.socket.on('disconnect', () => { this.connected = false; });

      // new meeting added by anyone → appears for all clients instantly
      this.socket.on('new-meeting', (meeting) => {
        const exists = this.meetings.some(m => m._id === meeting._id);
        if (!exists) this.meetings.push(meeting);
      });

      // meeting deleted by anyone → disappears for all clients instantly
      this.socket.on('meeting-deleted', ({ id }) => {
        this.meetings = this.meetings.filter(m => m._id !== id);
      });
    },

    unmounted() {
      if (this.socket) this.socket.disconnect();
    },

    methods: {
      async addMeeting() {
        if (!this.newMeeting.title.trim() || !this.newMeeting.date) return;
        this.loading = true;
        try {
          await api.addMeeting(this.newMeeting);
          this.newMeeting = {
            title: '', date: '', time: '',
            location: 'Thalia Linz – Landstraße', book: '', description: ''
          };
        } catch (e) {
          this.error = 'Could not save meeting.';
        } finally {
          this.loading = false;
        }
      },

      async removeMeeting(id) {
        try {
          await api.deleteMeeting(id);
        } catch (e) {
          this.error = 'Could not delete meeting.';
        }
      }
    }
  })
  .component('meeting-card', MeetingCard)
  .mount('#app');

</script>
</body>
</html>
